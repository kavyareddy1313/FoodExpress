name: CD — Deploy to AWS

on:
  workflow_run:
    workflows: ["CI — Lint, Test, Build & Push"]
    types:
      - completed

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Deploy to Staging
  # ──────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLICIP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            echo ">>> Deploying to staging environment..."
            mkdir -p ~/foodexpress-staging
            cd ~/foodexpress-staging

            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: kavya00/food-express-backend:latest
                container_name: foodexpress-staging-backend
                ports:
                  - "5001:5000"
                environment:
                  - NODE_ENV=staging
                  - MONGODB_URI=${{ secrets.MONGODB_URI }}
                  - PORT=5000
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                restart: always
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3

              frontend:
                image: kavya00/food-express-frontend:latest
                container_name: foodexpress-staging-frontend
                ports:
                  - "8080:80"
                depends_on:
                  backend:
                    condition: service_healthy
                restart: always
            EOF

            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f

      - name: Smoke Test — Health Check
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30
          echo "Running health check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_PUBLICIP }}:5001/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Staging health check passed!"
          else
            echo "❌ Staging health check failed with status: $STATUS"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Stage 2: Deploy to Production (requires approval)
  # ──────────────────────────────────────────────
  deploy-production:
    name: 🏭 Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval in GitHub Settings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLICIP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            echo ">>> Deploying to production environment..."
            mkdir -p ~/foodexpress-production
            cd ~/foodexpress-production

            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: kavya00/food-express-backend:latest
                container_name: foodexpress-prod-backend
                ports:
                  - "5000:5000"
                environment:
                  - NODE_ENV=production
                  - MONGODB_URI=${{ secrets.MONGODB_URI }}
                  - PORT=5000
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                restart: always
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s

              frontend:
                image: kavya00/food-express-frontend:latest
                container_name: foodexpress-prod-frontend
                ports:
                  - "80:80"
                depends_on:
                  backend:
                    condition: service_healthy
                restart: always

              redis:
                image: redis:7-alpine
                container_name: foodexpress-prod-redis
                ports:
                  - "6379:6379"
                restart: always
                volumes:
                  - redis-data:/data

            volumes:
              redis-data:
            EOF

            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f

      - name: Production Health Check
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_PUBLICIP }}:5000/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Production health check failed — initiating rollback..."
            exit 1
          fi

      - name: Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLICIP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/foodexpress-production
            echo ">>> Rolling back to previous version..."
            sudo docker compose down
            sudo docker compose up -d
            echo ">>> Rollback complete."
