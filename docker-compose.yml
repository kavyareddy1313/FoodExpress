version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodexpress-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodexpress-frontend
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env
    restart: always
    depends_on:
      - backend
