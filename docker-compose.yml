version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: foodexpress_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=foodexpress
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: foodexpress_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/foodexpress
      - JWT_SECRET=foodexpress_dev_secret_key_2024
    depends_on:
      mongodb:
        condition: service_healthy
    # A command to run seed.js then start the server
    command: >
      sh -c "node seed.js && npm start"

  frontend:
    build: ./frontend
    container_name: foodexpress_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090

  grafana:
    image: grafana/grafana:latest
    ports:
      - 3000:3000
    depends_on:
      - prometheus

volumes:
  mongodb_data:
