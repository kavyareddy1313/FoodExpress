apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: foodexpress
  labels:
    app: foodexpress
    component: backend
spec:
  type: ClusterIP
  selector:
    app: foodexpress
    component: backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
